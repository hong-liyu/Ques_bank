<!-- 历史题库页面，展示和管理本地存储的所有题库记录 -->
<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8"> <!-- 设置网页字符编码为UTF-8，支持中文显示 -->
    <title>历史题库</title> <!-- 网页标题 -->
    <link rel="stylesheet" href="../css/style.css"> <!-- 引入全局样式 -->
    <link rel="stylesheet" href="../css/parsed_list.css"> <!-- 新增：分离的历史题库专用样式 -->
    <link rel="stylesheet" href="../css/refactor_pages.css">
</head>
<body class="refactor-page refactor-history">
    <div class="grain" aria-hidden="true"></div>
    <div class="main-container">
        <!-- 左上角返回主页按钮 -->
        <a href="index.html" class="back-home-btn" title="返回主页">
            <svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 6L9 12L15 18" />
            </svg>
        </a>
        <header class="app-header">
            <h1>历史题库</h1>
        </header>
        <div class="content-wrapper">
            <main>
                <div class="filter-controls">
                    <div class="search-box">
                        <input type="text" id="searchQuery" placeholder="搜索题库...">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </div>
                    <div class="sort-dropdown">
                        <select id="sortOrder">
                            <option value="newest">按最新上传</option>
                            <option value="oldest">按最早上传</option>
                        </select>
                    </div>
                </div>
                <div class="history-grid" id="historyGrid"></div>
                <div class="empty-tip" id="emptyTip" style="display:none;">暂无历史题库，请先上传并解析。</div>
            </main>
        </div>
    </div>
    <!-- 题库预览弹窗，点击预览按钮时显示 -->
    <div id="previewModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>题库预览</h2>
            <div id="previewContent" class="preview-content"></div>
        </div>
    </div>
    <script src="../js/dialog_toast.js"></script>
    <script src="../js/parsed_list.js"></script>
    <script src="../js/theme_toggle.js"></script>
</body>
</html>

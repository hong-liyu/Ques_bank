<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题库上传 - DeepSeek AI解析</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/upload.css">
</head>
<body>
<body>
    <div class="upload-container">
        
        <header class="page-header">
            <a href="index.html" class="back-home-btn" title="返回主页">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18L9 12L15 6"/>
                </svg>
            </a>
            <h1>题库解析</h1>
        </header>

        <div class="upload-card">
            <main>
                <form id="uploadForm" enctype="multipart/form-data">
                    
                    <div class="form-group">
                        <label for="questionFile">选择题库文件</label>
                        <div class="drop-area" id="dropArea">
                            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <p>拖拽文件到此处，或点击选择</p>
                            <input type="file" id="questionFile" name="questionFile" accept=".docx" required style="display: none;">
                        </div>
                        <div class="file-info" id="fileInfo"></div>
                    </div>
                    <div class="form-group">
                        <label for="customPrompt">
                            <svg class="prompt-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path>
                                <line x1="4" y1="22" x2="4" y2="15"></line>
                            </svg>
                            自定义提示词（可选）
                        </label>
                        <textarea id="customPrompt" rows="3" placeholder="如需自定义AI解析指令，可在此输入，例如：请将题目解析为单选题和多选题，并确保答案格式正确。"></textarea>
                    </div>
                    <div class="btn-row">
                        <button type="submit" class="parse-btn" id="parseBtn">
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                            </svg>
                            智能解析
                        </button>
                    </div>
                    <div id="uploadStatus" class="status-message"></div>
                    <div class="loading-spinner" id="loadingSpinner" style="display:none;"></div>
                    <pre id="parseResult" class="parse-result"></pre>
                    <button type="button" id="toQuizBtn" style="display:none;">去刷题</button> </form>
            </main>
        </div>
    </div>
    <script src="../js/upload.js"></script>
</body>
</html>

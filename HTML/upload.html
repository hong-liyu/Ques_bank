<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题库上传 - AI解析</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/refactor_pages.css">
</head>
<body class="refactor-page refactor-upload">
    <div class="grain" aria-hidden="true"></div>
    <div class="upload-container">
        <header class="page-header">
            <a href="index.html" class="back-home-btn" title="返回首页">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M15 18L9 12L15 6"/>
                </svg>
            </a>
            <div class="header-text">
                <p class="header-kicker mono">AI Parsing</p>
                <h1>题库上传与解析</h1>
            </div>
        </header>

        <div class="upload-card">
            <main>
                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="upload-grid reduced">
                        <section class="upload-panel">
                            <div class="panel-header">
                                <span class="panel-kicker mono">Upload</span>
                                <h2>上传题库文件</h2>
                                <p>支持拖拽或点击选择文件，解析后可直接去刷题。</p>
                            </div>

                            <div class="drop-area" id="dropArea">
                                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                                <div class="drop-text">
                                    <p class="drop-title">拖拽文件到这里</p>
                                    <p class="drop-subtitle">支持 .docx / .pdf / .txt，最大 50MB</p>
                                </div>
                                <button type="button" class="ghost-btn">选择文件</button>
                                <input type="file" id="questionFile" name="questionFile" accept=".docx,.pdf,.txt" required style="display:none;">
                            </div>

                            <div class="file-info" id="fileInfo"></div>

                            <div class="rename-inline" id="renameInline" hidden>
                                <label for="customName" class="section-label">题库名称（用于历史题库）</label>
                                <input type="text" id="customName" maxlength="40" placeholder="请输入题库名称">
                                <p class="name-dup-hint" id="nameDuplicateHint" hidden></p>
                                <p class="field-note">默认使用文件名（不含后缀），你可以在这里先改好再解析。</p>
                            </div>

                            <details class="prompt-details">
                                <summary>高级选项：自定义提示词（可选）</summary>
                                <div class="prompt-panel is-open" id="customPromptPanel">
                                    <label for="customPrompt" class="section-label">提示词内容</label>
                                    <textarea id="customPrompt" rows="4" placeholder="例如：请将题目按单选、多选、判断、填空四类输出，并确保答案字段规范。"></textarea>
                                    <p class="field-note">默认不填即可，系统会使用标准解析策略。</p>
                                </div>
                            </details>
                        </section>
                    </div>

                    <div class="upload-actions">
                        <button type="submit" class="parse-btn" id="parseBtn">
                            <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                            </svg>
                            开始解析
                        </button>
                        <div id="uploadStatus" class="status-message"></div>
                    </div>

                    <section class="progress-card">
                        <div class="panel-header">
                            <span class="panel-kicker mono">Progress</span>
                            <h2>解析进度</h2>
                            <p>解析期间保持页面打开，状态会自动刷新。</p>
                        </div>
                        <div class="progress-container" id="progressContainer" style="display:none;">
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressFill"></div>
                            </div>
                            <div class="progress-text">
                                <span id="progressPercent">0%</span>
                                <span id="progressMsg">准备上传...</span>
                            </div>
                        </div>
                        <div class="loading-spinner" id="loadingSpinner" style="display:none;"></div>
                    </section>

                    <section class="result-card">
                        <div class="panel-header">
                            <span class="panel-kicker mono">Next</span>
                            <h2>完成后下一步</h2>
                            <p>解析成功后，直接进入刷题继续学习。</p>
                        </div>
                        <pre id="parseResult" class="parse-result"></pre>
                        <button type="button" id="toQuizBtn" style="display:none;">去刷题</button>
                    </section>
                </form>
            </main>
        </div>
    </div>

    <script src="../js/dialog_toast.js"></script>
    <script src="../js/upload.js"></script>
    <script src="../js/theme_toggle.js"></script>
</body>
</html>

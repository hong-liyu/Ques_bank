<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刷题系统-首页</title>
    <style>
        /* --- 基础和全局样式 --- */
        :root {
            --color-primary: #6D28D9; /* 深紫色 */
            --color-primary-light: #8B5CF6; /* 亮紫色 */
            --color-bg: #F3F4F6; /* 页面背景色 */
            --color-card-bg: #FFFFFF; /* 卡片背景色 */
            --color-text-dark: #1F2937; /* 深色文字 */
            --color-text-medium: #4B5563; /* 中等色文字 */
            --color-text-light: #6B7280; /* 浅色文字 */
            --color-border: #E5E7EB; /* 边框色 */
            --shadow: 0 8px 30px rgba(0,0,0,0.06); /* 阴影 */
            --border-radius: 1rem; /* 圆角 */
        }

        body {
            background: var(--color-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            margin: 0;
            padding: 2em 1em;
            color: var(--color-text-medium);
        }

        /* --- 顶部导航栏 --- */
        .header-bar {
            background: var(--color-card-bg);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            padding: 1em 2em;
            border-radius: var(--border-radius);
            max-width: 900px;
            margin: 0 auto 2.5em auto;
            text-align: center;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--color-text-dark);
        }

        /* --- 主内容区域 --- */
        main {
            max-width: 900px;
            margin: 0 auto;
        }

        .hero-title {
            font-size: 2.25rem;
            font-weight: bold;
            color: var(--color-text-dark);
            text-align: center;
            margin-bottom: 0.5em;
        }

        .hero-subtitle {
            font-size: 1.125rem;
            color: var(--color-text-light);
            text-align: center;
            margin-bottom: 3em;
        }

        /* --- 新的入口方块网格 --- */
        .entry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3em;
        }

        .entry-card {
            background: var(--color-card-bg);
            border-radius: var(--border-radius);
            padding: 2em;
            text-align: center;
            text-decoration: none;
            color: var(--color-text-dark);
            box-shadow: var(--shadow);
            border: 1px solid var(--color-border);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .entry-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.1);
            border-color: var(--color-primary-light);
        }
        
        .entry-card .icon {
            font-size: 2.5rem;
            margin-bottom: 0.75em;
            color: var(--color-primary);
        }

        .entry-card h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0 0 0.5em 0;
        }

        .entry-card p {
            font-size: 0.95rem;
            color: var(--color-text-light);
            margin: 0;
            line-height: 1.5;
        }

        /* --- 新的折叠功能区 --- */
        .features-accordion {
            background: var(--color-card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            border: 1px solid var(--color-border);
            margin: 0 auto;
            max-width: 600px; /* 限制最大宽度使其更美观 */
        }

        .features-accordion summary {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5em 2em;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--color-text-dark);
            cursor: pointer;
            list-style: none; /* 移除默认的箭头 */
        }
        
        .features-accordion summary::-webkit-details-marker {
            display: none; /* 同样为 Safari 移除箭头 */
        }

        .features-accordion summary .arrow {
            width: 24px;
            height: 24px;
            transition: transform 0.3s ease;
        }
        
        .features-accordion[open] > summary .arrow {
            transform: rotate(180deg);
        }

        .features-content {
            overflow: hidden;
            transition: height 0.4s cubic-bezier(0.25, 0.1, 0.25, 1.0);
        }

        .features-list {
            list-style: none;
            padding: 0 2em 1.5em 2em;
            margin: 0;
            border-top: 1px solid var(--color-border);
        }

        .features-list li {
            display: flex;
            align-items: center;
            gap: 1em;
            color: var(--color-text-medium);
            font-size: 1rem;
            padding: 1em 0;
        }
        
        .features-list li:not(:last-child) {
            border-bottom: 1px solid #f0f0f0;
        }
        
        .feature-icon {
            width: 24px;
            height: 24px;
            color: var(--color-primary-light);
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <header class="header-bar">
        <span class="header-title">刷题系统</span>
    </header>

    <main>
        <div class="hero-title">欢迎使用刷题系统</div>
        <div class="hero-subtitle">一个简洁高效的题库管理与练习平台</div>

        <div class="entry-grid">
            <a href="quiz.html" class="entry-card">
                <div class="icon">🚀</div>
                <h3>开始刷题</h3>
                <p>进入题库，开始您的学习和练习之旅。</p>
            </a>
            <a href="upload.html" class="entry-card">
                <div class="icon">☁️</div>
                <h3>上传题库</h3>
                <p>轻松上传并解析您的.docx格式题库文件。</p>
            </a>
            <a href="parsed_list.html" class="entry-card">
                <div class="icon">📚</div>
                <h3>历史题库</h3>
                <p>管理和回顾所有已上传和解析的题库。</p>
            </a>
        </div>
        
        <details class="features-accordion" id="features-details">
            <summary>
                功能简介
                <svg class="arrow" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" /></svg>
            </summary>
            <div class="features-content">
                <ul class="features-list">
                    <li>
                        <svg class="feature-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l-3.75 3.75M12 9.75l3.75 3.75M3 19.5h18" /></svg>
                        支持 <strong>.docx</strong> 题库上传与解析
                    </li>
                    <li>
                        <svg class="feature-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 6.375l-1.5-1.5-1.5 1.5-1.5-1.5-1.5 1.5-1.5-1.5-1.5 1.5-1.5-1.5-1.5 1.5-1.5-1.5-1.5 1.5V18h18V6.375zM4.5 18h15M12 4.5v15" /></svg>
                        解析后题库自动存储到本地，可随时刷题
                    </li>
                    <li>
                        <svg class="feature-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg>
                        支持单选、多选、判断题型
                    </li>
                    <li>
                        <svg class="feature-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z" /></svg>
                        刷题支持收藏、进度记录、错题反馈
                    </li>
                    <li>
                        <svg class="feature-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        历史题库可随时预览与管理
                    </li>
                </ul>
            </div>
        </details>
    </main>

    <script>
        // --- JavaScript 用于实现折叠面板的平滑动画 ---
        const details = document.getElementById('features-details');
        const content = details.querySelector('.features-content');

        details.addEventListener('toggle', function() {
            if (details.open) {
                // 当面板打开时
                content.style.height = 'auto';
                const autoHeight = content.scrollHeight + 'px';
                content.style.height = '0px';
                
                // 使用 requestAnimationFrame 确保浏览器准备好渲染
                requestAnimationFrame(() => {
                    content.style.height = autoHeight;
                });
            } else {
                // 当面板关闭时
                content.style.height = content.scrollHeight + 'px';
                requestAnimationFrame(() => {
                    content.style.height = '0px';
                });
            }
        });
        
        // 当动画结束时，将高度设置为auto，以适应窗口大小变化
        content.addEventListener('transitionend', () => {
            if (details.open) {
                content.style.height = 'auto';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刷题页面</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="highlight-theme-light">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="highlight-theme-dark" disabled>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/refactor_pages.css">
</head>
<body class="refactor-page refactor-quiz">
    <div class="grain" aria-hidden="true"></div>
    <div class="app-container">
        <header class="app-header">
            <a href="index.html" class="back-home-btn" title="返回首页">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M15 6L9 12L15 18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>
            <div class="quiz-title-group">
                <h1 id="quizTitleHeader">刷题页</h1>
                <div class="quiz-title-stats" id="quizTitleStats"></div>
            </div>
        </header>

        <div class="main-layout">
            <main class="question-column">
                <div class="question-card">
                    <div class="progress-section">
                        <div class="progress-bar-container">
                            <div class="progress-bar" id="progressBar"></div>
                        </div>
                        <span class="progress-text" id="progressText">Question 1 of 15</span>
                    </div>

                    <div class="question-area">
                        <div class="question-content" id="questionContent"></div>
                        <button class="favorite-btn" id="favoriteBtn" type="button" aria-label="收藏题目">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                            </svg>
                        </button>
                    </div>

                    <div class="options-area" id="optionsArea"></div>
                    <div class="feedback-area" id="feedbackArea"></div>

                    <div class="navigation-buttons">
                        <button id="nextQuestionBtn" class="action-btn next-btn" type="button" style="display:none;">下一题</button>
                    </div>
                </div>
            </main>

            <aside class="navigator-sidebar">
                <h2>题目导航</h2>
                <div class="navigator-grid" id="navigatorGrid"></div>
            </aside>
        </div>
    </div>

    <div class="quiz-picker-overlay" id="quizPickerModal" aria-hidden="true">
        <div class="quiz-picker-card" role="dialog" aria-modal="true" aria-labelledby="quizPickerTitle">
            <div class="quiz-picker-header">
                <div>
                    <p class="quiz-picker-kicker mono">Choose Bank</p>
                    <h2 id="quizPickerTitle">选择题库</h2>
                </div>
                <button type="button" class="quiz-picker-close" id="quizPickerClose" aria-label="关闭">×</button>
            </div>
            <p class="quiz-picker-subtitle">请选择要进入的题库，系统会自动加载。</p>
            <div class="quiz-picker-list" id="quizPickerList"></div>
            <div class="quiz-picker-empty" id="quizPickerEmpty">暂无题库，请先上传。</div>
            <div class="quiz-picker-footer">
                <a class="quiz-picker-link" href="upload.html">去上传题库</a>
                <a class="quiz-picker-link" href="parsed_list.html">查看历史题库</a>
            </div>
        </div>
    </div>

    <div class="quiz-favorite-overlay" id="favoriteModal" aria-hidden="true">
        <div class="quiz-favorite-card" role="dialog" aria-modal="true" aria-labelledby="favoriteModalTitle">
            <div class="quiz-favorite-header">
                <div>
                    <p class="quiz-picker-kicker mono">Favorite Folders</p>
                    <h2 id="favoriteModalTitle">收藏到收藏夹</h2>
                </div>
                <button type="button" class="quiz-picker-close" id="favoriteModalClose" aria-label="关闭">×</button>
            </div>
            <p class="quiz-picker-subtitle">选择已有收藏夹进行添加或移除，也可以立即创建新的收藏夹。</p>
            <div class="favorite-create-row">
                <input type="text" id="favoriteFolderInput" placeholder="新建收藏夹名称">
                <button type="button" class="action-btn next-btn" id="createFavoriteFolderBtn">新建</button>
            </div>
            <div class="favorite-folder-list" id="favoriteFolderList"></div>
            <div class="quiz-picker-empty" id="favoriteFolderEmpty">暂无收藏夹，请先创建一个。</div>
        </div>
    </div>

    <div class="quiz-complete-overlay" id="quizCompleteModal" aria-hidden="true">
        <div class="quiz-complete-card" role="dialog" aria-modal="true" aria-labelledby="quizCompleteTitle">
            <div class="quiz-complete-glow" aria-hidden="true"></div>
            <p class="quiz-complete-kicker mono">Session Complete</p>
            <h2 id="quizCompleteTitle">本轮完成</h2>
            <p class="quiz-complete-summary" id="quizCompleteSummary"></p>
            <div class="quiz-complete-metrics">
                <div class="quiz-complete-metric">
                    <span class="quiz-complete-metric-value" id="quizCompleteAccuracy">0%</span>
                    <span class="quiz-complete-metric-label">本轮正确率</span>
                </div>
                <div class="quiz-complete-metric">
                    <span class="quiz-complete-metric-value" id="quizCompleteScore">0 / 0</span>
                    <span class="quiz-complete-metric-label">答对题数</span>
                </div>
                <div class="quiz-complete-metric">
                    <span class="quiz-complete-metric-value" id="quizCompleteRuns">0 次</span>
                    <span class="quiz-complete-metric-label">累计已刷</span>
                </div>
                <div class="quiz-complete-metric">
                    <span class="quiz-complete-metric-value" id="quizCompleteDuration">0秒</span>
                    <span class="quiz-complete-metric-label">本轮用时</span>
                </div>
            </div>
            <div class="quiz-complete-actions">
                <button type="button" class="action-btn next-btn" id="reviewQuizBtn">回顾本题库</button>
                <a href="parsed_list.html" class="quiz-complete-link">返回题库列表</a>
            </div>
        </div>
    </div>

    <script src="../js/dialog_toast.js"></script>
    <script src="../js/favorite.js"></script>
    <script src="../js/quiz.js"></script>
    <script src="../js/theme_toggle.js"></script>
</body>
</html>

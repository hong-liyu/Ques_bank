<!-- 刷题页面主文件 -->
<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8"> <!-- 设置网页字符编码为UTF-8，支持中文显示 -->
    <title>刷题页面</title> <!-- 网页标题 -->
    <link rel="stylesheet" href="../css/quiz.css"> <!-- 引入刷题页面专用样式 -->
    <link rel="stylesheet" href="../css/style.css"> <!-- 引入通用样式 -->
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <a href="parsed_list.html" class="back-home-btn" title="返回题库列表">
                <svg viewBox="0 0 24 24">
                    <path d="M15 6L9 12L15 18" fill="none" stroke="#333333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>
            <h1 id="quizTitleHeader">刷题页</h1>
        </header>

        <div class="main-layout">
            <main class="question-column">
                <div class="question-card">
                    <div class="progress-section">
                        <div class="progress-bar-container">
                            <div class="progress-bar" id="progressBar"></div>
                        </div>
                        <span class="progress-text" id="progressText">Question 1 of 15</span>
                    </div>

                    <div class="question-area">
                        <div class="question-content" id="questionContent"></div>
                        <button class="favorite-btn" id="favoriteBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                            </svg>
                        </button>
                    </div>

                    <div class="options-area" id="optionsArea">
                        <!-- Options will be dynamically loaded here -->
                    </div>

                    <div class="feedback-area" id="feedbackArea">
                        <!-- Feedback messages will appear here -->
                    </div>

                    <div class="navigation-buttons">
                        <button id="nextQuestionBtn" class="action-btn next-btn" style="display:none;">下一题</button>
                    </div>
                </div>
            </main>

            <aside class="navigator-sidebar">
                <h2>题目导航</h2>
                <div class="navigator-grid" id="navigatorGrid">
                    <!-- Navigator items will be dynamically loaded here -->
                </div>
            </aside>
        </div>
    </div>
    <script src="../js/favorite.js"></script>
    <script src="../js/quiz.js"></script>
</body>
</html>
